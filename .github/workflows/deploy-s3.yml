name: Despliegue Automático a S3

on:
  push:
    branches:
      - main
      - master # Por si tu rama se llama master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del Frontend
        uses: actions/checkout@v3

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2 # La región de tu bucket (Ohio)

      - name: Sincronizar archivos con AWS S3
        run: |
          aws s3 sync . s3://chess-frontend-2026 --delete --exclude ".git/*" --exclude ".github/*"